name: hishells
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip

  # Core scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - tqdm
  - pyyaml

  # Astronomy / FITS
  - astropy
  - spectral-cube
  - radio-beam
  - reproject
  - jsonschema

  # Image processing & classical ML
  - scikit-image
  - scikit-learn
  - statsmodels

  # Deep learning (Apple Silicon: pytorch wheels include MPS support)
  - pytorch
  - torchvision

  # Notebooks
  - jupyterlab
  - ipykernel

  # Tests
  - pytest
  - pytest-xdist

  # Parallel HTTP downloader used by scripts/fetch_things.py
  - aria2

  # Install this repository in editable mode for `python -m hishells_pv...` commands.
  - pip:
      - -e .

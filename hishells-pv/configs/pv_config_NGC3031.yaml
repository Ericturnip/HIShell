# NGC 3031 (M81) - stress-galaxy aggregation config.
# Points at the EXISTING standardized dataset (no PV regeneration); the stress
# cuts ngc_3031__std_*.npy already live under output_root/pv with _posxy sidecars.
# Only cube_path (header/WCS for the sky-plane vote map), output_root, galaxy,
# and train.patch_{pos,vel} matter for `aggregate(split="stress")`.

cube_path: /Users/josephrodriguez/HI-Shells/hishells-pv/data/THINGS/NGC_3031_NA_CUBE_THINGS.FITS
output_root: /Users/josephrodriguez/HIShells/hishells-pv/training_data/standardized_5kpc_200kms

galaxy:
  ra_deg: null
  dec_deg: null
  pa_deg: null
  inc_deg: null
  vsys_kms: null
  beam_fwhm_arcsec: null   # filled from FITS BMAJ/BMIN during resolve_config

# Patch size MUST match the standardized model (256 spatial x 96 velocity).
# The legacy per-galaxy configs use patch_pos: 512, which would mis-tile here.
train:
  patch_pos: 256
  patch_vel: 96
  norm_method: zscore_galaxy_only

post:
  min_component_area_pv: [6, 5]

aggregate:
  vote_sigma_pix: 5
  nms_radius_pix: 12
  min_radius_beams: 2.5
  max_thickness_frac: 0.4
